trigger:
  branches:
    include:
      - main
#trigger: none

pool:
  vmImage: ubuntu-latest

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: dev
    values:
      - dev
      - staging
      - prod

variables:
  terraformVersion: '1.9.8'
  workingDirectory: 'ha-setup/env/${{ parameters.environment }}'

stages:

  # ============================================================
  # STAGE 1: VALIDATE
  # ============================================================
  - stage: Validate
    displayName: Terraform Validation
    jobs:
      - job: ValidateTerraform
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: $(terraformVersion)

          - bash: |
              terraform fmt -check -recursive
            workingDirectory: $(workingDirectory)
            displayName: Terraform Format Check

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              backendServiceArm: tfstatefile
              backendAzureRmResourceGroupName: POC
              backendAzureRmStorageAccountName: tfstatepoc2026
              backendAzureRmContainerName: tfstate
              backendAzureRmKey: '${{ parameters.environment }}/terraform.tfstate'
              workingDirectory: $(workingDirectory)

          - task: TerraformTaskV4@4
            displayName: Terraform Validate
            inputs:
              provider: azurerm
              command: validate
              workingDirectory: $(workingDirectory)

          - bash: |
              TFLINT_VERSION="0.54.0"
              curl -sLo tflint.zip https://github.com/terraform-linters/tflint/releases/download/v${TFLINT_VERSION}/tflint_linux_amd64.zip
              unzip -o tflint.zip -d /usr/local/bin/
              chmod +x /usr/local/bin/tflint
              tflint --init
              tflint --minimum-failure-severity=error
            workingDirectory: $(workingDirectory)
            displayName: Run TFLint

          - bash: |
              docker run --rm -v $(System.DefaultWorkingDirectory):/tf bridgecrew/checkov --directory /tf/ha-setup/env/${{ parameters.environment }} --skip-check CKV_AZURE_49,CKV_AZURE_178,CKV_AZURE_97,CKV_AZURE_149,CKV_AZURE_1,CKV_AZURE_50,CKV_AZURE_119,CKV_AZURE_160,CKV_AZURE_10
            displayName: Checkov Security Scan

  # ============================================================
  # STAGE 2: PLAN
  # ============================================================
  - stage: Plan
    displayName: Terraform Plan
    dependsOn: Validate
    jobs:
      - job: PlanTerraform
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              backendServiceArm: tfstatefile
              backendAzureRmResourceGroupName: POC
              backendAzureRmStorageAccountName: tfstatepoc2026
              backendAzureRmContainerName: tfstate
              backendAzureRmKey: '${{ parameters.environment }}/terraform.tfstate'
              workingDirectory: $(workingDirectory)

          - task: TerraformTaskV4@4
            displayName: Terraform Plan
            inputs:
              provider: azurerm
              command: plan
              commandOptions: '-out=tfplan'
              environmentServiceNameAzureRM: tfstatefile
              workingDirectory: $(workingDirectory)

          - publish: $(workingDirectory)/tfplan
            artifact: tfplan-${{ parameters.environment }}
            displayName: Upload Terraform Plan Artifact

  # ============================================================
  # STAGE 3: APPROVAL
  # ============================================================
  - stage: Approval
    displayName: Manual Approval
    dependsOn: Plan
    jobs:
      - job: WaitForApproval
        pool: server
        steps:
          - task: ManualValidation@0
            timeoutInMinutes: 1440
            inputs:
              notifyUsers: ''
              instructions: |
                Review Terraform plan output before deployment.

                Verify:
                  - Resource Group
                  - Networking
                  - Load Balancer
                  - VMSS
                  - Autoscaling
                  - Monitoring
                  - Alerts
                  - Key Vault references
            onTimeout: reject

  # ============================================================
  # STAGE 4: APPLY
  # ============================================================
  - stage: Apply
    displayName: Terraform Apply
    dependsOn: Approval
    jobs:
      - job: ApplyTerraform
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              backendServiceArm: tfstatefile
              backendAzureRmResourceGroupName: POC
              backendAzureRmStorageAccountName: tfstatepoc2026
              backendAzureRmContainerName: tfstate
              backendAzureRmKey: '${{ parameters.environment }}/terraform.tfstate'
              workingDirectory: $(workingDirectory)

          - download: current
            artifact: tfplan-${{ parameters.environment }}
            displayName: Download Terraform Plan Artifact

          - bash: |
              cp $(Pipeline.Workspace)/tfplan-${{ parameters.environment }}/tfplan $(workingDirectory)/tfplan
            displayName: Copy tfplan to Working Directory

          - task: TerraformTaskV4@4
            displayName: Terraform Apply
            inputs:
              provider: azurerm
              command: apply
              commandOptions: 'tfplan'
              environmentServiceNameAzureRM: tfstatefile
              workingDirectory: $(workingDirectory)
