trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  workingDirectory: 'multiple-env/env/dev'

steps:
- checkout: self

- task: TerraformInstaller@1
  displayName: Install Terraform
  inputs:
    terraformVersion: 'latest'

- task: TerraformTaskV4@4
  displayName: Terraform Init
  inputs:
    provider: 'azurerm'
    command: 'init'
    backendServiceArm: 'tfstatefile'
    backendAzureRmResourceGroupName: 'POC'
    backendAzureRmStorageAccountName: 'tfstatepoc2026'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'dev/terraform.tfstate'
    workingDirectory: '$(workingDirectory)'

- task: TerraformTaskV4@4
  displayName: Terraform Validate
  inputs:
    provider: 'azurerm'
    command: 'validate'
    workingDirectory: '$(workingDirectory)'

- task: TerraformTaskV4@4
  displayName: Terraform Plan
  inputs:
    provider: 'azurerm'
    command: 'plan'
    commandOptions: '-out=tfplan'
    environmentServiceNameAzureRM: 'tfstatefile'
    workingDirectory: '$(workingDirectory)'
  env:
    TF_VAR_db_password: $(var.db_password)

- task: TerraformTaskV4@4
  displayName: Terraform Apply
  inputs:
    provider: 'azurerm'
    command: 'apply'
    commandOptions: 'tfplan'
    environmentServiceNameAzureRM: 'tfstatefile'
    workingDirectory: '$(workingDirectory)'
  env:
    TF_VAR_db_password: $(var.db_password)

- bash: |
    cd $(workingDirectory)

    PUBLIC_IP=$(terraform output -raw vm_public_ip)

    echo "VM Public IP: $PUBLIC_IP"

    echo "##vso[task.setvariable variable=VM_PUBLIC_IP]$PUBLIC_IP"
  displayName: Get VM Public IP

- bash: |
    echo "Waiting for Nginx to become available..."

    for i in {1..30}; do

      STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$(VM_PUBLIC_IP) || true)

      echo "Attempt $i - HTTP Status: $STATUS"

      if [ "$STATUS" = "200" ]; then
        echo "Application is reachable."
        exit 0
      fi

      sleep 20

    done

    echo "Application failed health check."
    exit 1
  displayName: Validate Application

- task: TerraformTaskV4@4
  displayName: Terraform Destroy
  condition: always()
  inputs:
    provider: 'azurerm'
    command: 'destroy'
    environmentServiceNameAzureRM: 'tfstatefile'
    workingDirectory: '$(workingDirectory)'
  env:
    TF_VAR_db_password: $(var.db_password)
