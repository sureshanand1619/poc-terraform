trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: dev
    values:
      - dev
      - staging
      - prod

variables:
  terraformVersion: '1.9.8'
  workingDirectory: 'ha-setup/env/${{ parameters.environment }}'

stages:

  - stage: Validate
    displayName: Terraform Validation
    jobs:
      - job: ValidateTerraform
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: $(terraformVersion)

          - bash: |
              terraform fmt -check -recursive
            workingDirectory: $(workingDirectory)
            displayName: Terraform Format Check

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              backendServiceArm: tfstatefile
              backendAzureRmResourceGroupName: POC
              backendAzureRmStorageAccountName: tfstatepoc2026
              backendAzureRmContainerName: tfstate
              backendAzureRmKey: '${{ parameters.environment }}/terraform.tfstate'
              workingDirectory: $(workingDirectory)

          - task: TerraformTaskV4@4
            displayName: Terraform Validate
            inputs:
              provider: azurerm
              command: validate
              workingDirectory: $(workingDirectory)

          - bash: |
              curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
              tflint
            workingDirectory: $(workingDirectory)
            displayName: Run TFLint

          - bash: |
              docker run --rm \
                -v $(System.DefaultWorkingDirectory):/tf \
                bridgecrew/checkov \
                --directory /tf/ha-setup/env/${{ parameters.environment }}
            displayName: Checkov Security Scan

  - stage: Plan
    displayName: Terraform Plan
    dependsOn: Validate
    jobs:
      - job: PlanTerraform
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              backendServiceArm: tfstatefile
              backendAzureRmResourceGroupName: POC
              backendAzureRmStorageAccountName: tfstatepoc2026
              backendAzureRmContainerName: tfstate
              backendAzureRmKey: '${{ parameters.environment }}/terraform.tfstate'
              workingDirectory: $(workingDirectory)

          - task: TerraformTaskV4@4
            displayName: Terraform Plan
            inputs:
              provider: azurerm
              command: plan
              commandOptions: '-out=tfplan'
              environmentServiceNameAzureRM: tfstatefile
              workingDirectory: $(workingDirectory)

  - stage: Approval
    displayName: Manual Approval
    dependsOn: Plan
    jobs:
      - job: WaitForApproval
        pool: server
        steps:
          - task: ManualValidation@0
            timeoutInMinutes: 1440
            inputs:
              notifyUsers: ''
              instructions: |
                Review Terraform plan output before deployment.

                Verify:
                  - Resource Group
                  - Networking
                  - Load Balancer
                  - VMSS
                  - Autoscaling
                  - Monitoring
                  - Alerts
                  - Key Vault references
              onTimeout: reject

  - stage: Apply
    displayName: Terraform Apply
    dependsOn: Approval
    jobs:
      - deployment: ApplyTerraform
        environment: '${{ parameters.environment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: Install Terraform
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: TerraformTaskV4@4
                  displayName: Terraform Init
                  inputs:
                    provider: azurerm
                    command: init
                    backendServiceArm: tfstatefile
                    backendAzureRmResourceGroupName: POC
                    backendAzureRmStorageAccountName: tfstatepoc2026
                    backendAzureRmContainerName: tfstate
                    backendAzureRmKey: '${{ parameters.environment }}/terraform.tfstate'
                    workingDirectory: $(workingDirectory)

                - task: TerraformTaskV4@4
                  displayName: Terraform Apply
                  inputs:
                    provider: azurerm
                    command: apply
                    commandOptions: 'tfplan'
                    environmentServiceNameAzureRM: tfstatefile
                    workingDirectory: $(workingDirectory)
