#trigger:
#  branches:
#    include:
#      - main
trigger: none

pool:
  vmImage: ubuntu-latest

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: dev
    values:
      - dev
      - staging
      - prod
  - name: destroyInfra
    displayName: Destroy Infrastructure
    type: boolean
    default: false

variables:
  terraformVersion: '1.9.8'
  workingDirectory: 'ha-setup/env/${{ parameters.environment }}'

stages:

  # ============================================================
  # STAGE 1: VALIDATE
  # ============================================================
  - stage: Validate
    displayName: Terraform Validation
    condition: eq('${{ parameters.destroyInfra }}', false)
    jobs:
      - job: ValidateTerraform
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: $(terraformVersion)

          - bash: |
              terraform fmt -check -recursive
            workingDirectory: $(workingDirectory)
            displayName: Terraform Format Check

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              backendServiceArm: tfstatefile
              backendAzureRmResourceGroupName: POC
              backendAzureRmStorageAccountName: tfstatepoc2026
              backendAzureRmContainerName: tfstate
              backendAzureRmKey: '${{ parameters.environment }}/terraform.tfstate'
              workingDirectory: $(workingDirectory)

          - task: TerraformTaskV4@4
            displayName: Terraform Validate
            inputs:
              provider: azurerm
              command: validate
              workingDirectory: $(workingDirectory)

          - bash: |
              TFLINT_VERSION="0.54.0"
              curl -sLo tflint.zip https://github.com/terraform-linters/tflint/releases/download/v${TFLINT_VERSION}/tflint_linux_amd64.zip
              unzip -o tflint.zip -d /usr/local/bin/
              chmod +x /usr/local/bin/tflint
              tflint --init
              tflint --minimum-failure-severity=error
            workingDirectory: $(workingDirectory)
            displayName: Run TFLint

          - bash: |
              docker run --rm -v $(System.DefaultWorkingDirectory):/tf bridgecrew/checkov --directory /tf/ha-setup/env/${{ parameters.environment }} --skip-check CKV_AZURE_49,CKV_AZURE_178,CKV_AZURE_97,CKV_AZURE_149,CKV_AZURE_1,CKV_AZURE_50,CKV_AZURE_119,CKV_AZURE_160,CKV_AZURE_10
            displayName: Checkov Security Scan

  # ============================================================
  # STAGE 2: PLAN
  # ============================================================
  - stage: Plan
    displayName: Terraform Plan
    dependsOn: Validate
    condition: eq('${{ parameters.destroyInfra }}', false)
    jobs:
      - job: PlanTerraform
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              backendServiceArm: tfstatefile
              backendAzureRmResourceGroupName: POC
              backendAzureRmStorageAccountName: tfstatepoc2026
              backendAzureRmContainerName: tfstate
              backendAzureRmKey: '${{ parameters.environment }}/terraform.tfstate'
              workingDirectory: $(workingDirectory)

          - task: TerraformTaskV4@4
            displayName: Terraform Plan
            inputs:
              provider: azurerm
              command: plan
              commandOptions: '-out=tfplan'
              environmentServiceNameAzureRM: tfstatefile
              workingDirectory: $(workingDirectory)

          - bash: |
              echo "##[section]Terraform Plan Summary"
              terraform show -no-color tfplan | grep -E "^Plan:|will be created|will be destroyed|will be updated|must be replaced" || true
            workingDirectory: $(workingDirectory)
            displayName: Show Plan Summary

          - publish: $(workingDirectory)/tfplan
            artifact: tfplan-${{ parameters.environment }}
            displayName: Upload Terraform Plan Artifact

  # ============================================================
  # STAGE 3: APPROVAL
  # ============================================================
  - stage: Approval
    displayName: Manual Approval
    dependsOn: Plan
    condition: eq('${{ parameters.destroyInfra }}', false)
    jobs:
      - job: WaitForApproval
        pool: server
        steps:
          - task: ManualValidation@0
            timeoutInMinutes: 1440
            inputs:
              notifyUsers: ''
              onTimeout: reject
              instructions: |
                Review Terraform plan output before deployment.

                Verify:
                  - Resource Group
                  - Networking
                  - Load Balancer
                  - VMSS
                  - Autoscaling
                  - Monitoring
                  - Alerts
                  - Key Vault references

  # ============================================================
  # STAGE 4: APPLY
  # ============================================================
  - stage: Apply
    displayName: Terraform Apply
    dependsOn: Approval
    condition: eq('${{ parameters.destroyInfra }}', false)
    jobs:
      - job: ApplyTerraform
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              backendServiceArm: tfstatefile
              backendAzureRmResourceGroupName: POC
              backendAzureRmStorageAccountName: tfstatepoc2026
              backendAzureRmContainerName: tfstate
              backendAzureRmKey: '${{ parameters.environment }}/terraform.tfstate'
              workingDirectory: $(workingDirectory)

          - download: current
            artifact: tfplan-${{ parameters.environment }}
            displayName: Download Terraform Plan Artifact

          - bash: |
              cp $(Pipeline.Workspace)/tfplan-${{ parameters.environment }}/tfplan $(workingDirectory)/tfplan
            displayName: Copy tfplan to Working Directory

          - task: TerraformTaskV4@4
            displayName: Terraform Apply
            inputs:
              provider: azurerm
              command: apply
              commandOptions: 'tfplan'
              environmentServiceNameAzureRM: tfstatefile
              workingDirectory: $(workingDirectory)

          - bash: |
              echo "##[section]Terraform Outputs"
              terraform output
            workingDirectory: $(workingDirectory)
            displayName: Show Terraform Outputs

  # ============================================================
  # STAGE 5: DESTROY APPROVAL
  # ============================================================
  - stage: DestroyApproval
    displayName: Destroy Approval
    dependsOn: []
    condition: eq('${{ parameters.destroyInfra }}', true)
    jobs:
      - job: WaitForDestroyApproval
        pool: server
        steps:
          - task: ManualValidation@0
            timeoutInMinutes: 1440
            inputs:
              notifyUsers: ''
              onTimeout: reject
              instructions: |
                WARNING: You are about to DESTROY all infrastructure in ${{ parameters.environment }}.

                This will permanently delete:
                  - Resource Group
                  - Virtual Network and Subnets
                  - Network Security Groups
                  - Load Balancer
                  - VMSS and all instances
                  - Autoscale settings
                  - Monitoring and Alerts

                Type your approval only if you are absolutely sure.
                This action CANNOT be undone.

  # ============================================================
  # STAGE 6: DESTROY
  # ============================================================
  - stage: Destroy
    displayName: Terraform Destroy
    dependsOn: DestroyApproval
    condition: eq('${{ parameters.destroyInfra }}', true)
    jobs:
      - job: DestroyTerraform
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              backendServiceArm: tfstatefile
              backendAzureRmResourceGroupName: POC
              backendAzureRmStorageAccountName: tfstatepoc2026
              backendAzureRmContainerName: tfstate
              backendAzureRmKey: '${{ parameters.environment }}/terraform.tfstate'
              workingDirectory: $(workingDirectory)

          - task: TerraformTaskV4@4
            displayName: Terraform Destroy
            inputs:
              provider: azurerm
              command: destroy
              commandOptions: '-auto-approve'
              environmentServiceNameAzureRM: tfstatefile
              workingDirectory: $(workingDirectory)

          - bash: |
              echo "##[section]Destroy Complete"
              echo "All infrastructure in ${{ parameters.environment }} has been destroyed."
            displayName: Destroy Complete
